<!doctype html>
<html lang="fr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Examen Regional 2026</title>
  <link rel="stylesheet" href="appearance.css">
</head>
<body data-page="1bac">
  <div class="wrap">
    <div class="main">
      <h1 class="main-title">Examen Regional 2026</h1>
      <div class="main-date">Le 1 Juin 2026</div>
      <div class="countdown" aria-label="Countdown">
        <div class="timebox"><span class="num" id="cd-days">0</span><span class="label">Jours</span></div>
        <div class="timebox"><span class="num" id="cd-hours">0</span><span class="label">Heures</span></div>
        <div class="timebox"><span class="num" id="cd-mins">0</span><span class="label">Minutes</span></div>
        <div class="timebox"><span class="num" id="cd-secs">0</span><span class="label">Secondes</span></div>
      </div>
    </div>

    <div class="theme-menu" aria-label="Choix du thème">
      <button type="button" id="theme-toggle" class="theme-toggle" aria-expanded="false" aria-controls="theme-options">Thèmes</button>
      <div id="theme-options" class="theme-options" aria-hidden="true">
        <button type="button" class="theme-swatch" data-theme="theme-bleu" aria-label="Thème Bleu"></button>
        <button type="button" class="theme-swatch" data-theme="theme-violet" aria-label="Thème Violet"></button>
        <button type="button" class="theme-swatch" data-theme="theme-clair" aria-label="Thème Clair"></button>
        <button type="button" class="theme-swatch" data-theme="theme-vert" aria-label="Thème Vert"></button>
        <button type="button" class="theme-swatch" data-theme="theme-rose" aria-label="Thème Rose"></button>
        <button type="button" class="theme-swatch" data-theme="theme-orange" aria-label="Thème Orange"></button>
        <button type="button" class="theme-swatch" data-theme="theme-rouge" aria-label="Thème Rouge"></button>
        <button type="button" class="theme-swatch" data-theme="theme-ciel" aria-label="Thème Bleu clair"></button>
        <button type="button" class="theme-swatch" data-theme="theme-noir" aria-label="Thème Noir"></button>
        <button type="button" class="theme-swatch" data-theme="theme-gold" aria-label="Thème Doré"></button>
        <button type="button" class="theme-swatch" data-theme="theme-ocean" aria-label="Thème Océan"></button>
        <button type="button" class="theme-swatch" data-theme="theme-lavande" aria-label="Thème Lavande"></button>
        <button type="button" class="theme-swatch" data-theme="theme-forest" aria-label="Thème Forêt"></button>
        <button type="button" class="theme-swatch" data-theme="theme-sunset" aria-label="Thème Sunset"></button>
      </div>
    </div>

    <section class="student-panel-grid" aria-label="Student tools">
      <article class="glass-card todo-card">
        <h2>To do</h2>
        <form id="todo-form" class="todo-form" autocomplete="off">
          <input id="todo-input" type="text" maxlength="120" placeholder="Faire 3 examens">
          <button class="button" type="submit">Ajouter</button>
        </form>
        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
      </article>
    </section>

    <div class="section-title">Examens Regionaux</div>
    <div class="grid">
      <a class="button" href="majors/1bac/francais/regions.html">Francais</a>
      <a class="button" href="majors/1bac/arabe/regions.html">Arabe</a>
      <a class="button" href="majors/1bac/hg/regions.html">HG</a>
      <a class="button" href="majors/1bac/ei/regions.html">EI</a>
    </div>

    <div class="section-title">Cadres Référentiels</div>
    <div class="grid">
      <a class="button" href="view-pdf.html?pdf=EXAMS/cadre_1bac/cdrfr.pdf">Francais</a>
      <a class="button" href="view-pdf.html?pdf=EXAMS/cadre_1bac/cdrar.pdf">Arabe</a>
      <a class="button" href="view-pdf.html?pdf=EXAMS/cadre_1bac/cdrei.pdf">EI</a>
      <a class="button" href="view-pdf.html?pdf=EXAMS/cadre_1bac/cdrhg.pdf">HG</a>
    </div>
  </div>

  <script>
    const target = new Date('2026-06-01T08:00:00+01:00');
    const elDays = document.getElementById('cd-days');
    const elHours = document.getElementById('cd-hours');
    const elMins = document.getElementById('cd-mins');
    const elSecs = document.getElementById('cd-secs');

    function updateCountdown() {
      const diff = target.getTime() - Date.now();
      if (diff <= 0 || Number.isNaN(target.getTime())) {
        [elDays, elHours, elMins, elSecs].forEach((el) => { el.textContent = '0'; });
        return;
      }
      const totalSeconds = Math.floor(diff / 1000);
      elDays.textContent = Math.floor(totalSeconds / 86400);
      elHours.textContent = Math.floor((totalSeconds % 86400) / 3600);
      elMins.textContent = Math.floor((totalSeconds % 3600) / 60);
      elSecs.textContent = totalSeconds % 60;
    }

    function initTodoList() {
      const key = 'bac.todo.1bac';
      const form = document.getElementById('todo-form');
      const input = document.getElementById('todo-input');
      const list = document.getElementById('todo-list');
      const TO_COLLAPSE_AT = 6;
      let expanded = false;

      const toggleAll = document.createElement('button');
      toggleAll.type = 'button';
      toggleAll.className = 'todo-toggle-all';
      toggleAll.hidden = true;
      list.insertAdjacentElement('afterend', toggleAll);

      function read() {
        try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
      }

      function write(items) {
        localStorage.setItem(key, JSON.stringify(items));
      }

      function render() {
        const items = read();
        const visibleItems = expanded ? items : items.slice(0, TO_COLLAPSE_AT);
        list.innerHTML = '';

        visibleItems.forEach((item) => {
          const li = document.createElement('li');
          li.className = 'todo-item';
          li.innerHTML = `
            <button class="todo-check ${item.done ? 'is-done' : ''}" type="button" aria-label="Terminer"></button>
            <span class="todo-text ${item.done ? 'is-done' : ''}">${item.text}</span>
            <button class="todo-delete" type="button" aria-label="Supprimer">✕</button>
          `;

          li.querySelector('.todo-check').addEventListener('click', () => {
            item.done = !item.done;
            write(items);
            render();
          });

          li.querySelector('.todo-delete').addEventListener('click', () => {
            write(items.filter((entry) => entry.id !== item.id));
            render();
          });
          list.appendChild(li);
        });

        const hiddenCount = items.length - TO_COLLAPSE_AT;
        if (hiddenCount > 0) {
          toggleAll.hidden = false;
          toggleAll.textContent = expanded ? 'Afficher moins' : `Voir toutes les tâches (${hiddenCount})`;
        } else {
          toggleAll.hidden = true;
          expanded = false;
        }
      }

      toggleAll.addEventListener('click', () => {
        expanded = !expanded;
        render();
      });

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        const items = read();
        items.unshift({ id: crypto.randomUUID(), text, done: false });
        write(items.slice(0, 20));
        input.value = '';
        render();
      });

      render();
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    initTodoList();
  </script>
  <script src="./exam-progress.js" defer></script>
</body>
</html>
