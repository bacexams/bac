<!doctype html>
<html lang="fr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BacHub</title>
  <link rel="stylesheet" href="appearance.css">
</head>

<body>
   <main class="index-wrap">
    <section class="main index-main-card" aria-label="Choix du niveau">
      <h1 class="index-title">Choisis ton niveau</h1>
      <p class="index-subtitle">Accède</p>

      <div class="index-card-grid" aria-label="Niveaux disponibles">
        <article class="timebox index-level-card">
          <h2 class="index-card-title">2-BAC</h2>
          <p class="index-card-description">Examens régionaux classés par région, cadres référentiels, minuterie intégrée et corrections claires.</p>
          <button type="button" class="index-enter-button" onclick="window.location.href='2bac.html'">Acceder</button>
        </article>

        <article class="timebox index-level-card">
          <h2 class="index-card-title">1-BAC</h2>
          <p class="index-card-description">Examens nationaux classés par fillières, cadres référentiels, minuterie intégrée et corrections claires.</p>
          <button type="button" class="index-enter-button" onclick="window.location.href='1bac.html'">Acceder</button>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
