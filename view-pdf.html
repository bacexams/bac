<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>View PDF</title>
  <style>
    body { margin: 0; font-family: system-ui, Arial, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    #viewer { width: 100%; height: calc(100vh - 58px); border: 0; display: block; }
    .small { color: #444; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div><a href="index.html">← Back</a></div>
    <div class="small" id="filename"></div>
    <div class="small"><a id="download" href="#" target="_blank" rel="noopener">Download/Open</a></div>
  </header>

  <iframe id="viewer" title="PDF viewer"></iframe>

  <script>
    const params = new URLSearchParams(location.search);
    const pdfParam = params.get("pdf");

    const viewer = document.getElementById("viewer");
    const filename = document.getElementById("filename");
    const download = document.getElementById("download");

    if (!pdfParam) {
      filename.textContent = "No PDF specified. Use ?pdf=path/to/file.pdf";
      viewer.remove();
      download.remove();
    } else {
      const pdf = decodeURIComponent(pdfParam);

      const isPdf = pdf.toLowerCase().endsWith(".pdf");
      const hasTraversal = pdf.includes("..");
      const isBadScheme = /^[a-zA-Z]+:/.test(pdf); 

      if (!isPdf || hasTraversal || isBadScheme) {
        filename.textContent = "Invalid PDF path.";
        viewer.remove();
        download.remove();
      } else {
        filename.textContent = pdf;
        viewer.src = pdf;
        download.href = pdf;
      }
    }
  </script>
</body>
</html>
