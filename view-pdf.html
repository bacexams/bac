<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>View PDF</title>
    <link rel="stylesheet" href="appearance.css"/>
  </head>

  <body>
    <div class="exam-layout">
      <section class="pdf-reader" aria-label="PDF reader">
        <header class="pdf-toolbar">
          <div class="pdf-toolbar-left">
            <strong id="pdf-title">Document PDF</strong>
            <span id="pdf-status" role="status" aria-live="polite">Chargement…</span>
          </div>

          <div class="pdf-toolbar-actions">
            <a id="home-link" class="button-mini button-mini-link" href="./2bac.html">Accueil</a>
            <button id="back-button" class="button-mini" type="button">Retour</button>
            <button id="zoom-out" class="button-mini" type="button" aria-label="Zoom out">−</button>
            <button id="zoom-reset" class="button-mini" type="button" aria-label="Reset zoom">100%</button>
            <button id="zoom-in" class="button-mini" type="button" aria-label="Zoom in">+</button>
            <a id="open-native" class="button-mini button-mini-link" href="#" target="_blank" rel="noopener">Télécharger</a>
          </div>
        </header>

        <div id="pdf-container" class="pdf-container" aria-live="polite"></div>
      </section>

      <aside class="study-tools" aria-label="Study tools">
        <section class="focus-block timer-block" aria-label="Study timer">
            <div class="focus-row">
              <h4 class="focus-label">⏱️ Minuteur</h4>
            </div>

            <div id="timer-display" class="timer-display" aria-live="polite">02:00:00</div>

            <form id="timer-form" class="timer-form">
              <div class="time-columns" aria-label="Choose duration">
                <div class="time-unit">
                  <button class="timer-step-button compact-step" type="button" data-unit="hours" data-delta="1" aria-label="Increase hours">▲</button>
                  <input id="timer-hours" type="number" min="0" max="23" value="2" aria-label="Hours">
                  <button class="timer-step-button compact-step" type="button" data-unit="hours" data-delta="-1" aria-label="Decrease hours">▼</button>
                  <span class="time-unit-hint">Heures</span>
                </div>
                <div class="time-unit">
                  <button class="timer-step-button compact-step" type="button" data-unit="minutes" data-delta="1" aria-label="Increase minutes">▲</button>
                  <input id="timer-minutes" type="number" min="0" max="59" value="0" aria-label="Minutes">
                  <button class="timer-step-button compact-step" type="button" data-unit="minutes" data-delta="-1" aria-label="Decrease minutes">▼</button>
                  <span class="time-unit-hint">Minutes</span>
                </div>
                <div class="time-unit">
                  <button class="timer-step-button compact-step" type="button" data-unit="seconds" data-delta="1" aria-label="Increase seconds">▲</button>
                  <input id="timer-seconds" type="number" min="0" max="59" value="0" aria-label="Seconds">
                  <button class="timer-step-button compact-step" type="button" data-unit="seconds" data-delta="-1" aria-label="Decrease seconds">▼</button>
                  <span class="time-unit-hint">Secondes</span>
                </div>
              </div>

              <div class="timer-actions">
                <button class="button timer-main-button icon-button" type="submit" aria-label="Start timer">▶</button>
                <button id="timer-reset" class="button timer-main-button timer-reset-button icon-button" type="button" aria-label="Reset timer">↺</button>
              </div>
            </form>
          </section>

          <section class="focus-block ambiance-block" aria-label="Background sound controls">
            <h4 class="focus-label">🎵 Ambiance</h4>

            <div class="ambiance-actions">
              <div class="sound-select-stack">
                <select id="sound-select" class="sound-select" aria-label="Select ambiance">
                  <option value="brown-noise">Brown Noise</option>
                  <option value="rain">Rain</option>
                  <option value="lofi">Lofi</option>
                </select>
                <div id="lofi-variant-wrap" class="lofi-variant-wrap" aria-hidden="true">
                  <select id="lofi-variant-select" class="sound-select lofi-variant-select" aria-label="Select lofi track">
                    <option value="Care">Care</option>
                    <option value="Cologne">Cologne</option>
                    <option value="Cutie">Cutie</option>
                    <option value="Excite">Excite</option>
                    <option value="Falling">Falling</option>
                    <option value="Hope">Hope</option>
                    <option value="Iced">Iced</option>
                    <option value="Morning">Morning</option>
                    <option value="Snowy">Snowy</option>
                    <option value="Sonic">Sonic</option>
                    <option value="Sorcery">Sorcery</option>
                    <option value="Streets">Streets</option>
                    <option value="Sunset">Sunset</option>
                    <option value="Swift">Swift</option>
                    <option value="Tube">Tube</option>
                    <option value="Watermelon">Watermelon</option>
                  </select>
                </div>
              </div>
              <button id="sound-play" class="sound-play-circle" type="button" aria-pressed="false" aria-label="Play ambiance">▶</button>
            </div>
          </section>
      </aside>
    </div>

    <script type="module">
      import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.min.mjs';

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.worker.min.mjs';

      const urlParams = new URLSearchParams(window.location.search);
      const rawPdfPath = urlParams.get('pdf') || '';

      const decodedPdfPath = (() => {
        try { return decodeURIComponent(rawPdfPath); }
        catch { return rawPdfPath; }
      })();

      const titleEl = document.getElementById('pdf-title');
      const statusEl = document.getElementById('pdf-status');
      const containerEl = document.getElementById('pdf-container');
      const openNativeEl = document.getElementById('open-native');
      const homeLinkEl = document.getElementById('home-link');
      const backButtonEl = document.getElementById('back-button');
      const zoomOutBtn = document.getElementById('zoom-out');
      const zoomInBtn = document.getElementById('zoom-in');
      const zoomResetBtn = document.getElementById('zoom-reset');

      const pageCanvases = [];
      let pdfDoc = null;
      let zoomLevel = 1.15;
      let isRendering = false;

      const isValidPdfPath = decodedPdfPath.toLowerCase().endsWith('.pdf');
      const is1BacDocument = /(^|\/)(1bac|1-bac)\//i.test(decodedPdfPath);
      homeLinkEl.href = is1BacDocument ? './1bac.html' : './2bac.html';

      backButtonEl.addEventListener('click', () => {
        const hasReferrer = Boolean(document.referrer);
        const sameOriginReferrer = hasReferrer && document.referrer.startsWith(window.location.origin);
        if (window.history.length > 1 && sameOriginReferrer) {
          window.history.back();
          return;
        }
        window.location.href = homeLinkEl.href;
      });

      if (!isValidPdfPath) {
        statusEl.textContent = 'PDF introuvable. Vérifie le lien.';
        containerEl.innerHTML = '<p class="pdf-error">Le fichier PDF est manquant ou invalide.</p>';
      } else {
        const safePath = decodedPdfPath.replace(/\\/g, '/');
        const fileName = safePath.split('/').pop() || 'Document PDF';

        titleEl.textContent = fileName;
        openNativeEl.href = safePath;

        loadPdf(safePath);
      }

      async function loadPdf(path) {
        statusEl.textContent = 'Chargement du document…';

        try {
          const loadingTask = pdfjsLib.getDocument({ url: path, withCredentials: false });
          pdfDoc = await loadingTask.promise;

          statusEl.textContent = `${pdfDoc.numPages} pages`;
          await renderAllPages();
        } catch (error) {
          console.error('PDF loading error:', error);
          statusEl.textContent = 'Impossible de charger ce PDF.';
          containerEl.innerHTML = `
            <p class="pdf-error">Ce document ne peut pas être affiché ici.</p>
            <p class="pdf-error-sub">Essaie le bouton <strong>Télécharger</strong> pour l’ouvrir directement dans le navigateur.</p>
          `;
        }
      }

      function createPageShell(pageNumber) {
        const wrapper = document.createElement('section');
        wrapper.className = 'pdf-page-wrapper';

        const label = document.createElement('div');
        label.className = 'pdf-page-label';
        label.textContent = `Page ${pageNumber}`;

        const canvas = document.createElement('canvas');
        canvas.className = 'pdf-canvas';
        canvas.dataset.pageNumber = String(pageNumber);

        wrapper.append(label, canvas);
        containerEl.appendChild(wrapper);

        return canvas;
      }

      async function renderAllPages() {
        if (!pdfDoc || isRendering) return;
        isRendering = true;

        containerEl.innerHTML = '';
        pageCanvases.length = 0;

        for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber += 1) {
          const canvas = createPageShell(pageNumber);
          pageCanvases.push(canvas);
          await renderPage(pageNumber, canvas);
        }

        isRendering = false;
      }

      async function renderPage(pageNumber, canvas) {
        const page = await pdfDoc.getPage(pageNumber);
        const viewport = page.getViewport({ scale: zoomLevel });

        const maxWidth = containerEl.clientWidth - 24;
        const fitScale = maxWidth / viewport.width;
        const finalScale = fitScale < 1 ? zoomLevel * fitScale : zoomLevel;
        const finalViewport = page.getViewport({ scale: finalScale });

        const dpr = Math.max(window.devicePixelRatio || 1, 1);
        const context = canvas.getContext('2d', { alpha: false });

        canvas.width = Math.floor(finalViewport.width * dpr);
        canvas.height = Math.floor(finalViewport.height * dpr);
        canvas.style.width = `${Math.floor(finalViewport.width)}px`;
        canvas.style.height = `${Math.floor(finalViewport.height)}px`;

        context.setTransform(dpr, 0, 0, dpr, 0, 0);

        await page.render({ canvasContext: context, viewport: finalViewport }).promise;
      }

      async function rerenderWithZoom(nextZoom) {
        if (!pdfDoc || isRendering) return;
        zoomLevel = Math.min(2.3, Math.max(0.8, nextZoom));
        zoomResetBtn.textContent = `${Math.round(zoomLevel * 100)}%`;

        isRendering = true;
        statusEl.textContent = 'Mise à jour du zoom…';

        for (let i = 0; i < pageCanvases.length; i += 1) {
          await renderPage(i + 1, pageCanvases[i]);
        }

        isRendering = false;
        statusEl.textContent = `${pdfDoc.numPages} pages`;
      }

      zoomOutBtn.addEventListener('click', () => rerenderWithZoom(zoomLevel - 0.1));
      zoomInBtn.addEventListener('click', () => rerenderWithZoom(zoomLevel + 0.1));
      zoomResetBtn.addEventListener('click', () => rerenderWithZoom(1.15));

      let resizeTimer;
      window.addEventListener('resize', () => {
        if (!pdfDoc) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => rerenderWithZoom(zoomLevel), 140);
      });

    </script>
    <script>
      const timerDisplay = document.getElementById('timer-display');
      const timerForm = document.getElementById('timer-form');
      const timerHoursInput = document.getElementById('timer-hours');
      const timerMinutesInput = document.getElementById('timer-minutes');
      const timerSecondsInput = document.getElementById('timer-seconds');
      const timerReset = document.getElementById('timer-reset');
      const timeStepButtons = Array.from(document.querySelectorAll('[data-unit][data-delta]'));
      const DEFAULT_SECONDS = 2 * 60 * 60;
      let remainingSeconds = DEFAULT_SECONDS;
      let timerId = null;

      function formatTime(totalSeconds) {
        const safeSeconds = Math.max(0, totalSeconds);
        const hours = Math.floor(safeSeconds / 3600);
        const mins = Math.floor((safeSeconds % 3600) / 60);
        const secs = safeSeconds % 60;
        return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      function sanitizeTimeFields() {
        const hours = Math.max(0, Math.min(23, Number(timerHoursInput.value) || 0));
        const minutes = Math.max(0, Math.min(59, Number(timerMinutesInput.value) || 0));
        const seconds = Math.max(0, Math.min(59, Number(timerSecondsInput.value) || 0));

        timerHoursInput.value = String(hours);
        timerMinutesInput.value = String(minutes);
        timerSecondsInput.value = String(seconds);

        return { hours, minutes, seconds };
      }

      function totalSecondsFromFields() {
        const { hours, minutes, seconds } = sanitizeTimeFields();
        return (hours * 3600) + (minutes * 60) + seconds;
      }

      function setFieldsFromSeconds(totalSeconds) {
        const safeSeconds = Math.max(0, totalSeconds);
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        const seconds = safeSeconds % 60;
        timerHoursInput.value = String(hours);
        timerMinutesInput.value = String(minutes);
        timerSecondsInput.value = String(seconds);
      }

      function renderTimer() {
        timerDisplay.textContent = formatTime(remainingSeconds);
      }

      timerForm.addEventListener('submit', (event) => {
        event.preventDefault();
        remainingSeconds = Math.max(1, totalSecondsFromFields());
        setFieldsFromSeconds(remainingSeconds);
        renderTimer();

        clearInterval(timerId);
        timerId = setInterval(() => {
          remainingSeconds = Math.max(0, remainingSeconds - 1);
          renderTimer();
          if (remainingSeconds <= 0) {
            clearInterval(timerId);
            timerDisplay.classList.add('is-finished');
            setTimeout(() => timerDisplay.classList.remove('is-finished'), 1800);
          }
        }, 1000);
      });

      timerReset.addEventListener('click', () => {
        clearInterval(timerId);
        remainingSeconds = DEFAULT_SECONDS;
        setFieldsFromSeconds(remainingSeconds);
        renderTimer();
      });

      timeStepButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const unit = button.dataset.unit;
          const delta = Number(button.dataset.delta) || 0;
          if (!unit || !delta) return;

          const fieldMap = {
            hours: timerHoursInput,
            minutes: timerMinutesInput,
            seconds: timerSecondsInput,
          };

          const limits = {
            hours: [0, 23],
            minutes: [0, 59],
            seconds: [0, 59],
          };

          const targetInput = fieldMap[unit];
          const [minValue, maxValue] = limits[unit];
          const currentValue = Number(targetInput.value) || 0;
          const nextValue = Math.max(minValue, Math.min(maxValue, currentValue + delta));
          targetInput.value = String(nextValue);
        });
      });

      [timerHoursInput, timerMinutesInput, timerSecondsInput].forEach((field) => {
        field.addEventListener('input', sanitizeTimeFields);
      });

      setFieldsFromSeconds(DEFAULT_SECONDS);
      renderTimer();
    </script>
    <script src="./exam-progress.js" defer></script>
    <script>
      const soundPlayButton = document.getElementById('sound-play');
      const soundSelect = document.getElementById('sound-select');
      const lofiVariantWrap = document.getElementById('lofi-variant-wrap');
      const lofiVariantSelect = document.getElementById('lofi-variant-select');

      const lofiPlaylist = [
        'Care',
        'Cologne',
        'Cutie',
        'Excite',
        'Falling',
        'Hope',
        'Iced',
        'Morning',
        'Snowy',
        'Sonic',
        'Sorcery',
        'Streets',
        'Sunset',
        'Swift',
        'Tube',
        'Watermelon',
      ];

      const trackSources = {
        'brown-noise': './audio/brown.mp3',
        rain: './audio/rain.mp3',
      };

      let activeTrackId = soundSelect.value;
      let isPlaying = false;
      let currentVolume = 0.35;
      let activeAudio = null;

      function updateLofiVariantVisibility() {
        const showVariant = soundSelect?.value === 'lofi';
        lofiVariantWrap?.classList.toggle('is-visible', showVariant);
        lofiVariantWrap?.setAttribute('aria-hidden', showVariant ? 'false' : 'true');
      }

      function getCurrentAudioSource() {
        const selectedTrackId = soundSelect?.value || 'brown-noise';

        if (selectedTrackId === 'lofi') {
          const selectedSong = lofiVariantSelect?.value || lofiPlaylist[0];
          return `./audio/${selectedSong}.mp3`;
        }

        return trackSources[selectedTrackId] || trackSources['brown-noise'];
      }

      function stopActiveSound() {
        if (!activeAudio) return;
        activeAudio.pause();
        activeAudio.currentTime = 0;
        activeAudio.onended = null;
        activeAudio = null;
      }

      function attachAutoplayHandler(audio, selectedTrackId) {
        audio.onended = () => {
          if (selectedTrackId !== 'lofi') {
            audio.currentTime = 0;
            audio.play().catch((error) => {
              console.error('Unable to continue ambiance audio:', error);
            });
            return;
          }

          const currentSong = lofiVariantSelect?.value || lofiPlaylist[0];
          const currentIndex = lofiPlaylist.indexOf(currentSong);
          const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % lofiPlaylist.length : 0;
          const nextSong = lofiPlaylist[nextIndex];
          if (lofiVariantSelect) {
            lofiVariantSelect.value = nextSong;
          }
          playSelectedSound();
        };
      }

      async function playSelectedSound() {
        const selectedTrackId = soundSelect?.value || 'brown-noise';
        const source = getCurrentAudioSource();

        stopActiveSound();

        const nextAudio = new Audio(source);
        nextAudio.volume = Math.max(0, Math.min(1, currentVolume));
        nextAudio.preload = 'auto';
        attachAutoplayHandler(nextAudio, selectedTrackId);

        try {
          await nextAudio.play();
          activeAudio = nextAudio;
          activeTrackId = selectedTrackId;
          isPlaying = true;
          syncActiveTrackUi();
        } catch (error) {
          console.error('Unable to start audio track:', error);
          isPlaying = false;
          syncActiveTrackUi();
        }
      }

      function syncActiveTrackUi() {
        soundPlayButton.textContent = isPlaying ? '❚❚' : '▶';
        soundPlayButton.setAttribute('aria-pressed', isPlaying ? 'true' : 'false');
      }

      soundPlayButton.addEventListener('click', async () => {
        if (isPlaying) {
          stopActiveSound();
          isPlaying = false;
          syncActiveTrackUi();
          return;
        }

        await playSelectedSound();
      });

      soundSelect?.addEventListener('change', async () => {
        updateLofiVariantVisibility();
        await playSelectedSound();
      });

      lofiVariantSelect?.addEventListener('change', async () => {
        if ((soundSelect?.value || '') !== 'lofi') return;
        await playSelectedSound();
      });

      updateLofiVariantVisibility();
      syncActiveTrackUi();
    </script>
  </body>
</html>
